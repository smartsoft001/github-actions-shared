name: AI Impl (reusable)

on:
  workflow_call:
    inputs:
      issue_id:
        description: 'Linear issue identifier (e.g. GAL-123). The branch will be created with this exact name.'
        required: true
        type: string
      base_branch:
        description: 'Source branch and PR target'
        required: false
        type: string
        default: 'development'
      impl_command:
        description: 'Impl command variant: /impl, /flow:impl, /flow-legacy:impl, /flow-external:impl'
        required: false
        type: string
        default: '/flow:impl'
      commit_command:
        description: 'Commit command variant: /commit, /flow:commit, /flow-legacy:commit, /flow-external:commit'
        required: false
        type: string
        default: '/flow:commit'
      push_command:
        description: 'Push command variant: /push, /flow:push, /flow-legacy:push, /flow-external:push'
        required: false
        type: string
        default: '/flow:push'

      # AI gate classification from n8n dispatcher.
      # Drives model selection (Haiku/Sonnet/Opus), --max-turns, and --effort (low/medium/high/xhigh).
      # Empty values fall back to safe defaults (Sonnet + 200 turns + medium effort).
      ai_size:
        description: 'AI gate classification S/M/L. Drives max_turns and --effort.'
        required: false
        type: string
        default: ''
      ai_complexity:
        description: 'AI gate classification S/M/L. Drives model selection.'
        required: false
        type: string
        default: ''

      # Static overrides — non-empty values bypass the size/complexity mapping.
      # Useful for manual workflow_dispatch testing or repos with fixed requirements.
      model:
        description: 'Override impl model (empty = use size/complexity mapping)'
        required: false
        type: string
        default: ''
      effort:
        description: 'Override impl effort (low/medium/high/xhigh, empty = use mapping)'
        required: false
        type: string
        default: ''
      max_turns_impl:
        description: 'Override impl max-turns (0 = use mapping)'
        required: false
        type: number
        default: 0
      max_turns_commit:
        description: 'Max turns for /commit'
        required: false
        type: number
        default: 50
      max_turns_push:
        description: 'Max turns for /push'
        required: false
        type: number
        default: 50

      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '24'
      node_legacy:
        description: 'Use npm ci --legacy-peer-deps for repos with peer dep conflicts'
        required: false
        type: boolean
        default: false
      install_plugins:
        description: |
          Whether to register marketplaces and install Claude Code plugins.
          true (default) — runs both steps using values from plugins_install / marketplaces_register.
          false — skips both (e.g. for repos using bare /impl without plugins).
        required: false
        type: boolean
        default: true
      plugins_install:
        description: |
          Multi-line list of plugins to install via "claude plugin install".
          Format: one plugin per line.
          Default matches mobilems-muzeum-swiatowid configuration (smart + flow).
          Ignored when install_plugins=false.
        required: false
        type: string
        default: |
          smart@smartsoft --scope project
          flow@mobilems --scope project
      marketplaces_register:
        description: |
          Multi-line list of plugin marketplaces to register via "claude plugin marketplace add".
          Format: one path per line. Default assumes both packages are present in node_modules
          after npm ci (declared in caller repo's package.json).
          Ignored when install_plugins=false.
        required: false
        type: string
        default: |
          ./node_modules/@smartsoft001/claude-plugins
          ./node_modules/@smartsoft001-mobilems/claude-plugins

    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      LINEAR_API_KEY:
        required: true

jobs:
  impl:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write

    env:
      ISSUE_ID: ${{ inputs.issue_id }}
      BRANCH_NAME: ${{ inputs.issue_id }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      IMPL_COMMAND: ${{ inputs.impl_command }}
      COMMIT_COMMAND: ${{ inputs.commit_command }}
      PUSH_COMMAND: ${{ inputs.push_command }}
      ALLOWED_TOOLS: >-
        Read,Write,Edit,Glob,Grep,Bash,
        Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*),
        Skill(plan),Skill(impl),Skill(commit),Skill(push),Skill(review),
        Skill(flow:plan),Skill(flow:impl),Skill(flow:commit),Skill(flow:push),Skill(flow:review),
        Skill(flow-legacy:plan),Skill(flow-legacy:impl),Skill(flow-legacy:commit),Skill(flow-legacy:push),Skill(flow-legacy:review),
        Skill(flow-external:plan),Skill(flow-external:impl),Skill(flow-external:commit),Skill(flow-external:push),Skill(flow-external:review),
        mcp__linear

    steps:
      - name: Validate inputs and secrets
        run: |
          if [ -z "$ISSUE_ID" ]; then
            echo "::error::Missing issue_id"
            exit 1
          fi
          case "$IMPL_COMMAND" in
            "/impl"|"/flow:impl"|"/flow-legacy:impl"|"/flow-external:impl") ;;
            *)
              echo "::error::Invalid impl_command: $IMPL_COMMAND"
              exit 1
              ;;
          esac
          case "$COMMIT_COMMAND" in
            "/commit"|"/flow:commit"|"/flow-legacy:commit"|"/flow-external:commit") ;;
            *)
              echo "::error::Invalid commit_command: $COMMIT_COMMAND"
              exit 1
              ;;
          esac
          case "$PUSH_COMMAND" in
            "/push"|"/flow:push"|"/flow-legacy:push"|"/flow-external:push") ;;
            *)
              echo "::error::Invalid push_command: $PUSH_COMMAND"
              exit 1
              ;;
          esac
          echo "Implementing $ISSUE_ID"
          echo "  impl:        $IMPL_COMMAND"
          echo "  commit:      $COMMIT_COMMAND"
          echo "  push:        $PUSH_COMMAND"
          echo "  branch:      $BRANCH_NAME"
          echo "  base_branch: $BASE_BRANCH"
          echo "  ai_size:        ${{ inputs.ai_size }}"
          echo "  ai_complexity:  ${{ inputs.ai_complexity }}"
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN not set"
            exit 1
          fi

      - name: Resolve model, max-turns and effort from size/complexity
        id: resolve
        env:
          AI_SIZE: ${{ inputs.ai_size }}
          AI_COMPLEXITY: ${{ inputs.ai_complexity }}
          OVERRIDE_MODEL: ${{ inputs.model }}
          OVERRIDE_EFFORT: ${{ inputs.effort }}
          OVERRIDE_TURNS: ${{ inputs.max_turns_impl }}
        run: |
          # Normalize size/complexity (default M when empty — safe middle for manual dispatch)
          SIZE="${AI_SIZE:-M}"
          COMPLEXITY="${AI_COMPLEXITY:-M}"

          # ─── MODEL mapping (Variant C: Haiku tylko dla S/S) ─────────────────
          case "$SIZE/$COMPLEXITY" in
            S/S)                              model="claude-haiku-4-5"   ;;
            S/M|M/S|M/M|L/S)                  model="claude-sonnet-4-6"  ;;
            S/L|M/L|L/M|L/L)                  model="claude-opus-4-7"    ;;
            *)                                model="claude-sonnet-4-6"  ;;  # fallback
          esac

          # ─── MAX-TURNS mapping (size-driven) ────────────────────────────────
          case "$SIZE" in
            S) turns_impl=80   ;;
            M) turns_impl=150  ;;
            L) turns_impl=250  ;;
            *) turns_impl=150  ;;
          esac

          # ─── EFFORT mapping (per Emil's rules) ──────────────────────────────
          # SIZE=S → low
          # SIZE=M → medium
          # SIZE=L + complexity S/M → high
          # SIZE=L + complexity L   → xhigh
          case "$SIZE/$COMPLEXITY" in
            S/*)            effort="low"     ;;
            M/*)            effort="medium"  ;;
            L/S|L/M)        effort="high"    ;;
            L/L)            effort="xhigh"   ;;
            *)              effort="medium"  ;;
          esac

          # ─── STATIC OVERRIDES ────────────────────────────────────────────────
          if [ -n "$OVERRIDE_MODEL" ]; then
            echo "::notice::Model overridden via inputs: $OVERRIDE_MODEL (was $model)"
            model="$OVERRIDE_MODEL"
          fi
          if [ -n "$OVERRIDE_EFFORT" ]; then
            echo "::notice::Effort overridden via inputs: $OVERRIDE_EFFORT (was $effort)"
            effort="$OVERRIDE_EFFORT"
          fi
          if [ "$OVERRIDE_TURNS" != "0" ] && [ -n "$OVERRIDE_TURNS" ]; then
            echo "::notice::Max-turns overridden via inputs: $OVERRIDE_TURNS (was $turns_impl)"
            turns_impl="$OVERRIDE_TURNS"
          fi

          # ─── EFFORT FLAG (Haiku skip — no extended thinking support) ────────
          # Build the actual --effort CLI arg. Empty string = flag omitted.
          if [ "$model" = "claude-haiku-4-5" ]; then
            effort_flag=""
            effort_display="$effort (omitted for Haiku)"
          else
            effort_flag="--effort $effort"
            effort_display="$effort"
          fi

          # ─── OUTPUTS ────────────────────────────────────────────────────────
          {
            echo "model=$model"
            echo "turns_impl=$turns_impl"
            echo "effort=$effort"
            echo "effort_flag=$effort_flag"
          } >> "$GITHUB_OUTPUT"

          # ─── STEP SUMMARY (visible in GHA UI) ────────────────────────────────
          {
            echo "## 🎯 Model resolution"
            echo ""
            echo "| Param | Value |"
            echo "|---|---|"
            echo "| ai_size | \`$SIZE\` |"
            echo "| ai_complexity | \`$COMPLEXITY\` |"
            echo "| impl model | \`$model\` |"
            echo "| impl max-turns | $turns_impl |"
            echo "| impl effort | $effort_display |"
            echo "| commit model | \`claude-sonnet-4-6\` (fixed) |"
            echo "| push model | \`claude-sonnet-4-6\` (fixed) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout base branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for claude[bot]
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude-bot@users.noreply.github.com"

      - name: Create or checkout impl branch
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            echo "Branch $BRANCH_NAME already exists on origin, checking out"
            git fetch origin "$BRANCH_NAME":"$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Creating new branch $BRANCH_NAME from $BASE_BRANCH"
            git checkout -b "$BRANCH_NAME"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        if: ${{ !inputs.node_legacy }}
        run: npm ci

      - name: Install dependencies (legacy peer deps)
        if: ${{ inputs.node_legacy }}
        run: npm ci --legacy-peer-deps

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Override Claude permissions for CI
        run: |
          # In CI we cannot answer interactive approval prompts. We patch the repo's
          # .claude/settings.json IN-PLACE on the runner (never committed) and also
          # write .claude/settings.local.json with bypassPermissions as fallback.
          mkdir -p .claude

          if [ -f .claude/settings.json ]; then
            echo "Patching existing .claude/settings.json: ask -> [], adding allow list"
            python3 <<'PY'
          import json
          path = '.claude/settings.json'
          with open(path) as f:
              data = json.load(f)
          perms = data.get('permissions', {})
          old_ask = perms.get('ask', []) or []
          old_allow = perms.get('allow', []) or []
          merged_allow = list(dict.fromkeys(old_allow + old_ask))
          perms['allow'] = merged_allow
          perms['ask'] = []
          perms.setdefault('deny', [])
          data['permissions'] = perms
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f"Patched. allow={len(merged_allow)} entries, ask=[]")
          PY
            echo "Patched .claude/settings.json:"
            cat .claude/settings.json
          else
            echo "No .claude/settings.json found in repo — skipping patch"
          fi

          # Belt-and-suspenders fallback: settings.local.json with bypassPermissions
          python3 <<'PY'
          import json
          settings = {
            'permissions': {
              'defaultMode': 'bypassPermissions',
              'allow': [
                'Bash(git commit:*)', 'Bash(git push:*)',
                'Bash(gh pr create:*)', 'Bash(gh pr comment:*)', 'Bash(gh pr edit:*)',
                'Skill(plan)', 'Skill(impl)', 'Skill(commit)', 'Skill(push)', 'Skill(review)',
                'Skill(flow:plan)', 'Skill(flow:impl)', 'Skill(flow:commit)', 'Skill(flow:push)', 'Skill(flow:review)',
                'Skill(flow-legacy:plan)', 'Skill(flow-legacy:impl)', 'Skill(flow-legacy:commit)', 'Skill(flow-legacy:push)', 'Skill(flow-legacy:review)',
                'Skill(flow-external:plan)', 'Skill(flow-external:impl)', 'Skill(flow-external:commit)', 'Skill(flow-external:push)', 'Skill(flow-external:review)'
              ],
              'ask': [],
              'deny': []
            }
          }
          with open('.claude/settings.local.json', 'w') as f:
              json.dump(settings, f, indent=2)
          print("Wrote .claude/settings.local.json with bypassPermissions")
          PY
          cat .claude/settings.local.json

      - name: Register plugin marketplaces
        if: ${{ inputs.install_plugins }}
        env:
          MARKETPLACES: ${{ inputs.marketplaces_register }}
        run: |
          while IFS= read -r marketplace; do
            [ -z "$marketplace" ] && continue
            echo "Registering marketplace: $marketplace"
            claude plugin marketplace add "$marketplace"
          done <<< "$MARKETPLACES"

      - name: Install project plugins
        if: ${{ inputs.install_plugins }}
        env:
          PLUGINS: ${{ inputs.plugins_install }}
        run: |
          while IFS= read -r plugin; do
            [ -z "$plugin" ] && continue
            echo "Installing plugin: $plugin"
            claude plugin install $plugin
          done <<< "$PLUGINS"

      - name: Run impl command
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          # Model and effort dynamically resolved from ai_size/ai_complexity.
          # effort_flag is empty for Haiku (no extended thinking support).
          claude --print "$IMPL_COMMAND $ISSUE_ID --auto" \
            --model ${{ steps.resolve.outputs.model }} \
            --max-turns ${{ steps.resolve.outputs.turns_impl }} \
            ${{ steps.resolve.outputs.effort_flag }} \
            --dangerously-skip-permissions \
            --permission-mode bypassPermissions \
            --mcp-config '{"mcpServers":{"linear":{"type":"http","url":"https://mcp.linear.app/mcp","headers":{"Authorization":"Bearer '"$LINEAR_API_KEY"'"}}}}' \
            --allowedTools "$ALLOWED_TOOLS"

      - name: Run commit command
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          # Commit always uses Sonnet (cheap, safe) with low effort — simple git op.
          claude --print "$COMMIT_COMMAND $ISSUE_ID --auto" \
            --model claude-sonnet-4-6 \
            --max-turns ${{ inputs.max_turns_commit }} \
            --effort low \
            --dangerously-skip-permissions \
            --permission-mode bypassPermissions \
            --mcp-config '{"mcpServers":{"linear":{"type":"http","url":"https://mcp.linear.app/mcp","headers":{"Authorization":"Bearer '"$LINEAR_API_KEY"'"}}}}' \
            --allowedTools "$ALLOWED_TOOLS"

      - name: Run push command
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          # Push always uses Sonnet (cheap, safe) with low effort — simple git push.
          claude --print "$PUSH_COMMAND $ISSUE_ID --auto" \
            --model claude-sonnet-4-6 \
            --max-turns ${{ inputs.max_turns_push }} \
            --effort low \
            --dangerously-skip-permissions \
            --permission-mode bypassPermissions \
            --mcp-config '{"mcpServers":{"linear":{"type":"http","url":"https://mcp.linear.app/mcp","headers":{"Authorization":"Bearer '"$LINEAR_API_KEY"'"}}}}' \
            --allowedTools "$ALLOWED_TOOLS"

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git log origin/$BASE_BRANCH..HEAD --oneline 2>/dev/null)" ]; then
            echo "Skipping PR — no commits"
            exit 0
          fi

          PR_BODY_FILE=$(mktemp)
          cat > "$PR_BODY_FILE" <<EOF
          Auto-generated PR from \`$IMPL_COMMAND $ISSUE_ID --auto\` + \`$COMMIT_COMMAND $ISSUE_ID --auto\` + \`$PUSH_COMMAND $ISSUE_ID --auto\`.

          Linear issue: https://linear.app/smartflow001/issue/$ISSUE_ID
          Triggered by: ai-impl-dispatcher (n8n)
          Branch: \`$BRANCH_NAME\` -> \`$BASE_BRANCH\`

          AI gate classification:
          - size: ${{ inputs.ai_size }}
          - complexity: ${{ inputs.ai_complexity }}
          - model used: ${{ steps.resolve.outputs.model }}
          - effort: ${{ steps.resolve.outputs.effort }}

          This PR was created automatically and requires human review before merge.
          EOF

          existing_pr=$(gh pr list --head "$BRANCH_NAME" --base "$BASE_BRANCH" --json number --jq '.[0].number' || echo "")

          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for branch $BRANCH_NAME"
            gh pr comment "$existing_pr" --body "Auto-impl: new changes pushed (size=${{ inputs.ai_size }}, complexity=${{ inputs.ai_complexity }}, model=${{ steps.resolve.outputs.model }})"
          else
            gh pr create \
              --head "$BRANCH_NAME" \
              --base "$BASE_BRANCH" \
              --title "[$ISSUE_ID] automated implementation" \
              --body-file "$PR_BODY_FILE"
          fi

          rm -f "$PR_BODY_FILE"
